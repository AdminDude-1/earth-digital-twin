<html>
<head>

  <title>Curts 3D Earth Digital Twin v2</title>

  <!-- Cesium CSS -->
  <link href="https://unpkg.com/cesium@1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">
  Curts 3D Earth Digital Twin v2<br>
  Drag = rotate<br>
  Scroll = zoom
</div>

<script>
  Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZGUxODg4OS00OWNlLTRjMzctYjQzOC1lNDRjYjFjM2NkNDgiLCJpZCI6NDIzOTE1LCJpYXQiOjE3NzcyNDIzMzJ9.Iuafcf0QPEX8p90nMyyQvk3oU4UGzK7OV1-HvRDOzoU";

  var viewer = new Cesium.Viewer("cesiumContainer", {
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    baseLayerPicker: true,
    animation: false,
    timeline: false
  });

  viewer.scene.globe.enableLighting = true;

  // Start in space
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-95, 30, 30000000)
});

// After a short delay, fly to Rockport MA

      -70.6203,  // longitude
      42.6556,   // latitude
      500       // height in meters (~street level-ish)
    ),
    duration: 5,  // seconds for smooth flight
    orientation: {
      heading: 0.0,
      pitch: -0.4,   // slight tilt for better viewing angle
      roll: 0.0
    }
  });
}, 1500); // wait 1.5 seconds before flying
</script>
