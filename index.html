<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Curts 3D Earth Digital Twin v3</title>

  <!-- Cesium JS -->
  <script src="https://unpkg.com/cesium@1.113/Build/Cesium/Cesium.js"></script>

  <!-- Cesium CSS -->
  <link rel="stylesheet"
    href="https://unpkg.com/cesium@1.113/Build/Cesium/Widgets/widgets.css">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">
  Curts 3D Earth Digital Twin v3<br>
  Flying to Motif #1 - Rockport MA
</div>

<script>
  // ✅ Your token
  Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZGUxODg4OS00OWNlLTRjMzctYjQzOC1lNDRjYjFjM2NkNDgiLCJpZCI6NDIzOTE1LCJpYXQiOjE3NzcyNDIzMzJ9.Iuafcf0QPEX8p90nMyyQvk3oU4UGzK7OV1-HvRDOzoU";

  // ✅ Create viewer
  var viewer = new Cesium.Viewer("cesiumContainer", {
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    baseLayerPicker: true,
    animation: false,
    timeline: false
  });

  viewer.scene.globe.enableLighting = true;

  // ✅ Start from space
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-95, 30, 30000000)
  });

  // ✅ Fly to Motif #1
  setTimeout(function () {
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(
        -70.6207,  // Motif #1 longitude
        42.6559,   // Motif #1 latitude
        300        // very close zoom (near street level)
      ),
      duration: 7,
      orientation: {
        heading: 0.5,
        pitch: -0.65,
        roll: 0.0
      }
    });
  }, 1500);
</script>

</body>
</html>
