<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Curt’s 3D Earth Digital Twin</title>

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: system-ui, sans-serif;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255,255,255,0.95);
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <div class="panel">
    <strong>Curt’s 3D Earth Digital Twin</strong><br>
    Drag = rotate<br>
    Scroll = zoom
  </div>

  <script type="module">
    import {
      Viewer,
      Ion,
      createWorldImagery,
      IonWorldImageryStyle,
      Cartesian3,
      EllipsoidTerrainProvider
    } from "https://cdn.jsdelivr.net/npm/cesium@1.113.1/Build/Cesium/Cesium.js";

    // ✅ Your token (keep it here)
    Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZGUxODg4OS00OWNlLTRjMzctYjQzOC1lNDRjYjFjM2NkNDgiLCJpZCI6NDIzOTE1LCJpYXQiOjE3NzcyNDIzMzJ9.Iuafcf0QPEX8p90nMyyQvk3oU4UGzK7OV1-HvRDOzoU";

    const viewer = new Viewer("cesiumContainer", {
      imageryProvider: createWorldImagery({
        style: IonWorldImageryStyle.AERIAL
      }),
      terrainProvider: new EllipsoidTerrainProvider(),
      baseLayerPicker: false,
      timeline: false,
      animation: false
    });

    viewer.scene.globe.enableLighting = true;

    viewer.camera.setView({
      destination: Cartesian3.fromDegrees(-95, 30, 30000000)
    });
  </script>
</body>
</html>
