<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Curts 3D Earth Digital Twin v10.2</title>

<!-- Cesium JS -->
<script src="https://unpkg.com/cesium@1.113/Build/Cesium/Cesium.js"></script>

<!-- Cesium CSS -->
<link href="https://unpkg.com/cesium@1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
}

button {
  margin-top: 5px;
  width: 100%;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">
<b>Curts Earth Twin v10.2</b><br>
<button onclick="flyToMotif()">Go to Motif #1</button>
<button onclick="flyToBoston()">Go to Boston</button>
<button onclick="flyToConstitution()">USS Constitution</button>
</div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZGUxODg4OS00OWNlLTRjMzctYjQzOC1lNDRjYjFjM2NkNDgiLCJpZCI6NDIzOTE1LCJpYXQiOjE3NzcyNDIzMzJ9.Iuafcf0QPEX8p90nMyyQvk3oU4UGzK7OV1-HvRDOzoU";

var viewer = new Cesium.Viewer("cesiumContainer", {
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  baseLayerPicker: true,
  animation: false,
  timeline: false
});

viewer.scene.globe.enableLighting = true;

// ✅ Motif #1 marker
var motif = viewer.entities.add({
  name: "Motif #1",
  position: Cesium.Cartesian3.fromDegrees(-70.6148485, 42.6592475),
  billboard: {
    image: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
    scale: 0.05
  },
  label: {
    text: "Motif #1",
    pixelOffset: new Cesium.Cartesian2(0, -30),
    fillColor: Cesium.Color.YELLOW
  },

  // ✅ FIXED DESCRIPTION
  description: `
    <h2>Motif #1</h2>
    <img width="300" src="https://raw.githubusercontent.com/AdminDude-1/earth-digital-twin/main/Motif1.jpg">
    <p>Motif #1 is a famous fishing shack in Rockport, Massachusetts.</p>
  `
});


// ✅ USS Constitution marker (FIXED placement)
var constitution = viewer.entities.add({
  name: "USS Constitution",
  position: Cesium.Cartesian3.fromDegrees(
    -71.05661978085676,
    42.37249808679547
  ),
  billboard: {
    image: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
    scale: 0.05
  },
  label: {
    text: "USS Constitution",
    pixelOffset: new Cesium.Cartesian2(0, -30),
    fillColor: Cesium.Color.CYAN
  }
});

// ✅ Start in space
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-95, 30, 30000000)
});

// ✅ Functions now properly defined

function flyToMotif() {
  viewer.flyTo(motif, {
    duration: 5,
    offset: new Cesium.HeadingPitchRange(0.2, -0.6, 250)
  });
}

function flyToBoston() {
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-71.0589, 42.3601, 3000),
    duration: 5
  });
}

function flyToConstitution() {
  viewer.flyTo(constitution, {
    duration: 6,
    offset: new Cesium.HeadingPitchRange(0.3, -0.6, 300)
  });
}
</script>

</body>
</html>
