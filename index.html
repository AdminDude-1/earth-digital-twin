<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Curts 3D Earth Digital Twin v5</title>

<!-- Cesium JS -->
<script src="https://unpkg.com/cesium@1.113/Build/Cesium/Cesium.js"></script>

<!-- Cesium CSS -->
<link rel="stylesheet" href="https://unpkg.com/cesium@1.113/Build/Cesium/Widgets/widgets.css">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.panel {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
}

button {
  margin-top: 5px;
  width: 100%;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<div class="panel">
<b>Curts Earth Twin v5</b><br>
<button onclick="flyToMotif()">Go to Motif #1</button>
<button onclick="flyToBoston()">Go to Boston</button>
</div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2ZGUxODg4OS00OWNlLTRjMzctYjQzOC1lNDRjYjFjM2NkNDgiLCJpZCI6NDIzOTE1LCJpYXQiOjE3NzcyNDIzMzJ9.Iuafcf0QPEX8p90nMyyQvk3oU4UGzK7OV1-HvRDOzoU";

// ✅ Create viewer
var viewer = new Cesium.Viewer("cesiumContainer", {
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  baseLayerPicker: true,
  animation: false,
  timeline: false
});

// ✅ Enable lighting (day/night effect)
viewer.scene.globe.enableLighting = true;

// ✅ Add Motif #1 marker (guaranteed visible)
var motif = viewer.entities.add({
  name: "Motif #1",
  position: Cesium.Cartesian3.fromDegrees(-70.6207, 42.6559),
  billboard: {
    image: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
    scale: 0.05
  },
  label: {
    text: "Motif #1",
    font: "14px Arial",
    pixelOffset: new Cesium.Cartesian2(0, -30),
    fillColor: Cesium.Color.YELLOW
  }
});

// ✅ Start view (overlooking Earth)
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(-95, 30, 30000000)
});

// ✅ Fly to Motif #1
function flyToMotif() {
  viewer.flyTo(motif, {
    duration: 5,
    offset: new Cesium.HeadingPitchRange(0, -0.6, 200)
  });
}

// ✅ Fly to Boston
function flyToBoston() {
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-71.0589, 42.3601, 3000),
    duration: 5,
    orientation: {
      heading: 0,
      pitch: -0.5,
      roll: 0
    }
  });
}

</script>

</body>
</html>
