<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Curt’s 3D Earth Digital Twin</title>

  <!-- CesiumJS -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
  <link
    rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: black;
    }

    #cesiumContainer {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255,255,255,0.95);
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .panel h1 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .panel p {
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <div class="panel">
    <h1>Curt’s 3D Earth Digital Twin</h1>
    <p>Drag = rotate</p>
    <p>Scroll = zoom</p>
  </div>

  <script>
    // Create viewer with NO token-required services
    const viewer = new Cesium.Viewer("cesiumContainer", {
      imageryProvider: Cesium.createWorldImagery({
        style: Cesium.IonWorldImageryStyle.AERIAL
      }),
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      baseLayerPicker: false,
      geocoder: false,
      timeline: false,
      animation: false,
      sceneModePicker: false,
      navigationHelpButton: false
    });

    // Ensure Earth is visible
    viewer.scene.globe.show = true;
    viewer.scene.backgroundColor = Cesium.Color.BLACK;
    viewer.scene.globe.enableLighting = true;

    // Force camera to Earth
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(
        -90,   // longitude
        20,    // latitude
        30_000_000 // height (space view)
      )
    });
  </script>
</body>
</html>
